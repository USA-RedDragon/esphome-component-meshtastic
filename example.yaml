esphome:
  name: meshtastic
  friendly_name: meshtastic

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

external_components:
  - source: github://USA-RedDragon/esphome-component-meshtastic@main
    components: [meshtastic]

spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

sx126x:
  id: id_sx126x
  busy_pin: GPIO4
  cs_pin: GPIO1
  dio1_pin: GPIO5
  rst_pin: GPIO2
  frequency: 906875000
  hw_version: sx1262
  modulation: LORA
  pa_power: 22
  pa_ramp: 200us
  rf_switch: true
  rx_start: true
  tcxo_delay: 5ms
  tcxo_voltage: 1_8V

  bandwidth: 250_0kHz
  crc_enable: true
  preamble_size: 16
  spreading_factor: 11
  coding_rate: CR_4_5
  sync_value: [0x24, 0xb4]

meshtastic:
  - radio: id_sx126x
    long_name: "ESP32S3"
    short_name: "ESPS"
    node_num: 0xDEAD
    role: CLIENT
    hop_limit: 3
    node_info_interval: 3h
    hw_model: DIY_V1
    node_db_size: 100 # optional; 0 disables the node DB
    channels:
      - name: LongFast
        psk: AQ==
        uplink: false
        downlink: false
    on_packet:
      - logger.log:
          format: "Packet !%08x->!%08x portnum=%u len=%u rssi=%.0f snr=%.1f"
          args: ['from', 'to', 'portnum', '(unsigned) payload.size()', 'rssi', 'snr']
    on_text:
      - logger.log:
          format: "Mesh text from !%08x (ch %u): %s"
          args: ['from', 'channel', 'text.c_str()']
    on_nodeinfo:
      - logger.log:
          format: "NodeInfo !%08x: %s (%s)"
          args: ['from', 'long_name.c_str()', 'short_name.c_str()']
    on_position:
      - logger.log:
          format: "Position !%08x: %.6f, %.6f (%dm)"
          args: ['from', 'latitude', 'longitude', 'altitude']
    on_telemetry:
      - logger.log:
          format: "Telemetry !%08x: batt=%u%% %.2fV"
          args: ['from', 'battery_level', 'voltage']

button:
  - platform: template
    name: "Send Mesh Hello"
    on_press:
      - meshtastic.send_text:
          text: "hello from esphome"
          channel: LongFast
