esphome:
  name: meshtastic
  friendly_name: meshtastic

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key
  # Expose any send_* action as a Home Assistant service (esphome.meshtastic_*)
  actions:
    - action: send_text
      variables:
        message: string
        channel: string
      then:
        - meshtastic.send_text:
            text: !lambda return message;
            channel: !lambda return channel;
    - action: send_position
      variables:
        latitude: float
        longitude: float
      then:
        - meshtastic.send_position:
            latitude: !lambda return latitude;
            longitude: !lambda return longitude;

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True

external_components:
  - source: github://USA-RedDragon/esphome-component-meshtastic@main
    components: [meshtastic]

spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

sx126x:
  id: id_sx126x
  busy_pin: GPIO4
  cs_pin: GPIO1
  dio1_pin: GPIO5
  rst_pin: GPIO2
  frequency: 906875000
  hw_version: sx1262
  modulation: LORA
  pa_power: 22
  pa_ramp: 200us
  rf_switch: true
  rx_start: true
  tcxo_delay: 5ms
  tcxo_voltage: 1_8V

  bandwidth: 250_0kHz
  crc_enable: true
  preamble_size: 16
  spreading_factor: 11
  coding_rate: CR_4_5
  sync_value: [0x24, 0xb4]

meshtastic:
  - id: id_meshtastic
    radio: id_sx126x
    long_name: "ESP32S3"      # <=40 chars; default "Meshtastic <short>"
    short_name: "ESPS"        # <=4 chars; default = last 4 hex of node_num
    node_num: 0xDEAD          # optional; default = last 4 bytes of the MAC
    # private_key: !secret meshtastic_private_key  # PKI/DM key (base64, 32B); auto-generated + persisted if omitted
    role: CLIENT              # any mainline role (deprecated ones warn at startup)
    hop_limit: 3              # 0-7
    node_info_interval: 3h    # >=1h (Meshtastic minimum); broadcast our NodeInfo this often
    # neighbor_info_interval: 4h  # >=4h; if set, periodically advertise our 0-hop neighbors
    hw_model: DIY_V1          # any HardwareModel
    node_db_size: 100         # optional; per-platform default; 0 disables the node DB
    channels:
      # psk: 'default' | 'none' | index 0-255 | base64 (1/16/32 bytes) | hex (32/64 chars)
      - name: LongFast
        psk: default          # the well-known public key (same as AQ== / index 1)
        uplink: false         # (MQTT, phase F) publish packets heard on this channel
        downlink: false       # (MQTT, phase F) inject packets from MQTT onto this channel
      - name: Private
        psk: 72+hNz2WKsLa5iESyBeYFRKMczH8ob3e5KE0gC+T7YQ=   # full 32-byte AES-256 key
      - name: Regional
        psk: Uw==             # 1-byte index (default key, last byte bumped)
      - name: Cleartext
        psk: none             # no encryption
    on_packet:
      # Raw escape hatch: fires for every decoded packet.
      - logger.log:
          format: "Packet !%08x->!%08x portnum=%u len=%u rssi=%.0f snr=%.1f"
          args: ['from', 'to', 'portnum', '(unsigned) payload.size()', 'rssi', 'snr']
    on_text:
      - logger.log:
          format: "Text from !%08x (ch %s): %s"
          args: ['from', 'channel.c_str()', 'text.c_str()']
    on_nodeinfo:
      - logger.log:
          format: "NodeInfo !%08x (ch %s): %s (%s) role=%d rssi=%.0f"
          args: ['from', 'channel.c_str()', 'user.long_name', 'user.short_name', '(int) user.role', 'rssi']
    on_position:
      - logger.log:
          format: "Position !%08x (ch %s): %.6f, %.6f %dm prec=%u"
          args: ['from', 'channel.c_str()', 'position.latitude_i * 1e-7', 'position.longitude_i * 1e-7', 'position.altitude', 'position.precision_bits']
    on_telemetry:
      - logger.log:
          format: "Telemetry !%08x (ch %s): batt=%u pct %.2fV up=%us"
          args: ['from', 'channel.c_str()', 'metrics.battery_level', 'metrics.voltage', 'metrics.uptime_seconds']
    on_environment_metrics:
      - logger.log:
          format: "Env !%08x (ch %s): %.1fC %.0f%%RH %.1fhPa lux=%.0f iaq=%u"
          args: ['from', 'channel.c_str()', 'metrics.temperature', 'metrics.relative_humidity', 'metrics.barometric_pressure', 'metrics.lux', 'metrics.iaq']
    on_traceroute_response:
      # Fires when a meshtastic.traceroute we sent comes back; `route` is the decoded RouteDiscovery.
      - logger.log:
          format: "Traceroute reply via !%08x: %u out, %u back"
          args: ['from', '(unsigned) route.route_count', '(unsigned) route.route_back_count']
    on_neighbor_info:
      - logger.log:
          format: "NeighborInfo !%08x: %u neighbors"
          args: ['from', '(unsigned) info.neighbors_count']

# Local status entities (this node / whole-mesh aggregates), surfaced to Home Assistant.
sensor:
  - platform: meshtastic
    meshtastic_id: id_meshtastic
    nodes_online:
      name: "Mesh nodes online"   # heard within the last 2h
    nodes_known:
      name: "Mesh nodes known"    # total in the node DB
    neighbors:
      name: "Mesh neighbors"      # directly heard (0 hops)
    last_rx_age:
      name: "Last mesh RX age"    # seconds since any packet was heard
    rx_packets:
      name: "Mesh packets received"
    tx_packets:
      name: "Mesh packets transmitted"
    relayed_packets:
      name: "Mesh packets relayed"
    dropped_duplicate:
      name: "Mesh duplicates dropped"
    no_key:
      name: "Mesh packets without a key"   # heard on a channel we don't carry (normal)
    decode_failed:
      name: "Mesh decode failures"         # hash matched but decrypt/parse failed (bad data)

text_sensor:
  - platform: meshtastic
    meshtastic_id: id_meshtastic
    node_id:
      name: "Mesh node id"        # our !hex node id

button:
  - platform: template
    name: "Send text"
    on_press:
      - meshtastic.send_text:
          text: "hello mesh"
          channel: LongFast      # by name; omit for primary
          to: 0xFFFFFFFF         # omit for broadcast (^all)
          want_ack: false

  - platform: template
    name: "Send device telemetry"
    on_press:
      - meshtastic.send_telemetry:
          battery_level: 87
          voltage: 3.92
          channel_utilization: 12.5
          air_util_tx: 3.1
          uptime_seconds: !lambda return (uint32_t) (esphome::millis() / 1000);

  - platform: template
    name: "Re-broadcast NodeInfo"
    on_press:
      - meshtastic.send_node_info:

  - platform: template
    name: "Traceroute to node"
    on_press:
      # Probe the path to a node; the discovered route is logged when the reply returns.
      - meshtastic.traceroute:
          to: 0xDEADBEEF
          channel: LongFast      # by name; omit for primary

  - platform: template
    name: "Send environment"
    on_press:
      # Every EnvironmentMetrics field is optional; only the ones set are sent.
      - meshtastic.send_environment_metrics:
          temperature: 21.5
          relative_humidity: 48.0
          barometric_pressure: 1013.2
          gas_resistance: 50000
          voltage: 3.9
          current: 0.12
          distance: 1.5
          lux: 350
          white_lux: 360
          ir_lux: 40
          uv_lux: 12
          wind_direction: 270
          wind_speed: 3.4
          wind_gust: 5.1
          wind_lull: 2.0
          weight: 12.3
          radiation: 0.08
          rainfall_1h: 0.2
          rainfall_24h: 4.8
          soil_moisture: 38
          soil_temperature: 14.2
          iaq: 75
          one_wire_temperature: [21.5, 22.0, 19.8]   # up to 8

uart:
  - id: gps_uart
    rx_pin: GPIO44
    tx_pin: GPIO43
    baud_rate: 9600
gps:
  id: my_gps
  uart_id: gps_uart
  latitude:
    id: gps_lat
  longitude:
    id: gps_lon
  altitude:
    id: gps_alt
interval:
  - interval: 5min
    then:
      - meshtastic.send_position:
          latitude: !lambda return id(gps_lat).state;
          longitude: !lambda return id(gps_lon).state;
          altitude: !lambda return (int) id(gps_alt).state;
          precision_bits: 32      # < 32 coarsens our location
